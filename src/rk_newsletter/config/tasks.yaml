research_task:
  description: >
    Search for the latest news (past 2 days) on each company in the RK Group watchlist.
    For each company run a search and collect the top stories.
    IMPORTANT: Only include articles published within the last 2 days. If an article's date
    is older than 2 days, skip it entirely — do not include it even if it seems relevant.
    Return a structured research report: one section per company, 2-4 bullet points each.
    Format: "- [what happened] — [why it matters to RK Group]"
    If no significant news in the past 2 days, write "No major news today." for that company.
  expected_output: Structured research report with one section per company and 2-4 bullet points each, all from the past 2 days only.
  agent: researcher

write_task:
  description: >
    Using the research report, write the RK Group Intelligence Newsletter for this week.
    Return a JSON object with exactly two keys:
    1. "subject": email subject line
    2. "html": complete HTML email body
    Return ONLY the JSON, no markdown fences.
  expected_output: A JSON object with "subject" and "html" keys.
  agent: writer

send_task:
  description: >
    Send the newsletter to all recipients.
    Parse the JSON from the previous task to get the subject and HTML body.
    Call send_email with the to, subject, and body_html arguments.
    Report whether the email was sent successfully.
  expected_output: Confirmation that the email was sent successfully.
  agent: sender
